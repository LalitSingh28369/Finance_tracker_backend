# ==========================================
# Application
# ==========================================
spring.application.name=finance-tracker

# ==========================================
# Server
# Railway automatically provides PORT
# ==========================================


server.port=${PORT:8080}
server.address=0.0.0.0

# ==========================================
# PostgreSQL Database
# ==========================================
spring.datasource.url=${DB_URL}
spring.datasource.username=${DB_USERNAME}
spring.datasource.password=${DB_PASSWORD}

# Railway PostgreSQL SSL
spring.datasource.hikari.data-source-properties.sslmode=require

# ==========================================
# JPA / Hibernate
# ==========================================
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect
spring.jpa.properties.hibernate.jdbc.time_zone=UTC

# ==========================================
# JWT
# ==========================================
jwt.secret=${JWT_SECRET}
jwt.expiration=86400000

# ==========================================
# Email Configuration
# ==========================================
spring.mail.host=smtp.gmail.com
spring.mail.port=587
spring.mail.username=${MAIL_USERNAME}
spring.mail.password=${MAIL_PASSWORD}

spring.mail.properties.mail.smtp.auth=true
spring.mail.properties.mail.smtp.starttls.enable=true
spring.mail.properties.mail.smtp.starttls.required=true
spring.mail.properties.mail.smtp.connectiontimeout=5000
spring.mail.properties.mail.smtp.timeout=5000
spring.mail.properties.mail.smtp.writetimeout=5000

# ==========================================
# Budget Limits
# ==========================================
budget.limit.Food=5000
budget.limit.Transport=3000
budget.limit.Entertainment=2000
budget.limit.Shopping=4000
budget.limit.Health=2000
budget.limit.Other=1000

# ==========================================
# Circular References
# ==========================================
spring.main.allow-circular-references=false
