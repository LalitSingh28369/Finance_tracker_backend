# ==========================================
# Application
# ==========================================
spring.application.name=finance-tracker

# ==========================================
# Server (Railway auto PORT)
# ==========================================
server.port=${PORT:8080}
server.address=0.0.0.0

# ==========================================
# PostgreSQL Database
# ==========================================
spring.datasource.url=${DB_URL}
spring.datasource.username=${DB_USERNAME}
spring.datasource.password=${DB_PASSWORD}

spring.datasource.hikari.data-source-properties.sslmode=require

# ==========================================
# JPA / Hibernate
# ==========================================
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect
spring.jpa.properties.hibernate.jdbc.time_zone=UTC

# ==========================================
# JWT
# ==========================================
jwt.secret=${JWT_SECRET}
jwt.expiration=86400000

# ==========================================
# EMAIL (REPLACED - RESEND)
# ==========================================
resend.api.key=${RESEND_API_KEY}
resend.from.email=${RESEND_FROM_EMAIL}

# ==========================================
# Budget Limits
# (unchanged)
# ==========================================
budget.limit.Food=5000
budget.limit.Transport=3000
budget.limit.Entertainment=2000
budget.limit.Shopping=4000
budget.limit.Health=2000
budget.limit.Other=1000

# ==========================================
# Circular References
# ==========================================
spring.main.allow-circular-references=false
